<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Customer</title>
</head>
<body>
    <h2>Customer Registration Form</h2>
    <form th:action="@{/saveCustomer}" th:object="${customer}" method="post">
        <label>Name:</label>
        <input type="text" th:field="*{name}" required /><br/>

        <label>Email:</label>
        <input type="email" th:field="*{email}" required /><br/>

        <label>Phone Number:</label>
        <input type="text" th:field="*{phoneNumber}" required /><br/>

        <label>Address:</label>
        <textarea th:field="*{address}" required></textarea><br/>

        <button type="submit">Save Customer</button>
    </form>
</body>
</html>
