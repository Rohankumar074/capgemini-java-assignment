<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Customer List</title>
</head>
<body>
    <h2>Registered Customers</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Customer ID</th> <th>Name</th> <th>Email</th> <th>Phone Number</th> <th>Address</th> </tr>
        </thead>
        <tbody>
            <tr th:each="cust : ${customers}">
                <td th:text="${cust.id}"></td>
                <td th:text="${cust.name}"></td>
                <td th:text="${cust.email}"></td>
                <td th:text="${cust.phoneNumber}"></td>
                <td th:text="${cust.address}"></td>
            </tr>
        </tbody>
    </table>
    <br/>
    <a th:href="@{/addCustomer}">Add New Customer</a>
</body>
</html>
